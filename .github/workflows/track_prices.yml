name: Track Perth Mint Prices

on:
  schedule:
    - cron: '0 0 * * *'   # daily at 00:00 UTC (10am AEST)
  workflow_dispatch:        # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run price tracker
        run: python perthmint_price_tracker.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add perthmint_cast_bar_prices.csv
          git diff --staged --quiet || git commit -m "Price update $(date -u '+%Y-%m-%d %H:%M')"
          git push