<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perth Mint Price Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    header { background: #1a1a2e; color: #fff; padding: 1.5rem 2rem; }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header p { font-size: 0.85rem; color: #aaa; margin-top: 0.25rem; }
    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; color: #444; text-transform: uppercase; letter-spacing: 0.05em; }
    h3 { font-size: 0.8rem; font-weight: 700; padding: 0.5rem 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .gold-head { background: #fef9ec; color: #92640a; border-bottom: 1px solid #f0e0a0; }
    .silver-head { background: #f0f4f8; color: #4a5568; border-bottom: 1px solid #d0dde8; }
    .card { background: #fff; border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card-no-pad { background: #fff; border-radius: 8px; overflow-x: auto; margin-bottom: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 1.5rem 1.5rem 0; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 2px solid #eee; color: #666; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
    td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    .price { font-weight: 600; color: #1a1a2e; }
    .updated { font-size: 0.8rem; color: #888; margin-top: 0.75rem; }
    .chart-wrap { position: relative; height: 280px; }
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
    .top-row { display: grid; grid-template-columns: 1fr auto; gap: 1.5rem; margin-bottom: 2rem; align-items: start; }
    .conversion-aside { background: #fff; border-radius: 8px; padding: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); min-width: 200px; }
    .conversion-aside h2 { font-size: 0.7rem; margin-bottom: 0.5rem; }
    .conversion-aside table { font-size: 0.78rem; }
    .conversion-aside th { font-size: 0.7rem; padding: 0.3rem 0.5rem; }
    .conversion-aside td { padding: 0.3rem 0.5rem; }
    @media (max-width: 640px) { .charts-row { grid-template-columns: 1fr; } .top-row { grid-template-columns: 1fr; } }
    #status { text-align: center; padding: 3rem; color: #888; }
  </style>
</head>
<body>
  <header>
    <h1>Perth Mint Price Tracker</h1>
    <p>Live gold &amp; silver cast bar prices — updated daily</p>
  </header>
  <main>
    <div id="status">Loading prices…</div>
    <div id="content" style="display:none">
      <div class="top-row">
        <div class="card-no-pad">
          <h2>Latest Prices in AUD</h2>
          <table id="latest-table">
            <thead><tr id="latest-thead"><th>Product</th></tr></thead>
            <tbody></tbody>
          </table>
          <p class="updated" id="last-updated"></p>
          <p style="height:1rem"></p>
        </div>
        <div class="conversion-aside">
          <h2>Weight Reference</h2>
          <table>
            <thead><tr><th>Troy Oz</th><th>Grams</th></tr></thead>
            <tbody>
              <tr><td>1 oz</td><td>31.10 g</td></tr>
              <tr><td>3.22 oz</td><td>100 g</td></tr>
              <tr><td>5 oz</td><td>155.52 g</td></tr>
              <tr><td>10 oz</td><td>311.03 g</td></tr>
              <tr><td>32.15 oz</td><td>1,000 g</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="charts-row">
        <div class="card">
          <h2>Gold — Last 7 Days</h2>
          <div class="chart-wrap"><canvas id="chart-gold"></canvas></div>
        </div>
        <div class="card">
          <h2>Silver — Last 7 Days</h2>
          <div class="chart-wrap"><canvas id="chart-silver"></canvas></div>
        </div>
      </div>
    </div>
  </main>
  <script>
    const CSV_URL = 'https://raw.githubusercontent.com/guptais/perthmint-tracker/main/perthmint_cast_bar_prices.csv';

    const GOLD_COLORS   = ['#c9832a','#e9a84c','#f5c97a','#a05c1a'];
    const SILVER_COLORS = ['#457b9d','#2a9d8f','#6baec6'];

    function buildChart(canvasId, allTs, entries, colors) {
      const datasets = Object.entries(entries).map(([name, data], i) => {
        const map = Object.fromEntries(data.map(e => [e.ts, e.price]));
        return {
          label: name.replace('The Perth Mint ', ''),
          data: allTs.map(ts => map[ts] ?? null),
          borderColor: colors[i % colors.length],
          backgroundColor: 'transparent',
          tension: 0.3,
          pointRadius: allTs.length < 30 ? 4 : 2,
          spanGaps: true,
        };
      });
      new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: { labels: allTs.map(ts => ts.replace('T',' ').slice(0,16)), datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } },
          scales: {
            x: { ticks: { maxTicksLimit: 8, font: { size: 10 } } },
            y: { ticks: { callback: v => 'AUD ' + v.toLocaleString('en-AU') } },
          },
        },
      });
    }

    async function load() {
      const res = await fetch(CSV_URL + '?_=' + Date.now());
      const text = await res.text();
      const rows = text.trim().split('\n').slice(1).map(r => {
        const cols = r.match(/(".*?"|[^,]+)(?=,|$)/g) || [];
        return cols.map(c => c.replace(/^"|"$/g, '').trim());
      });

      // group by product
      const byProduct = {};
      for (const [ts, name, price] of rows) {
        if (!byProduct[name]) byProduct[name] = [];
        byProduct[name].push({ ts, price: parseFloat(price) });
      }

      // split gold / silver
      const gold   = Object.fromEntries(Object.entries(byProduct).filter(([n]) => n.includes('Gold')));
      const silver = Object.fromEntries(Object.entries(byProduct).filter(([n]) => n.includes('Silver')));

      // all unique timestamps sorted, last 10 max
      const tableTs = [...new Set(rows.map(r => r[0]))].sort().slice(-10);
      const colCount = tableTs.length + 1;

      // build header row — short date+time labels
      const thead = document.getElementById('latest-thead');
      tableTs.forEach(ts => {
        const th = document.createElement('th');
        th.textContent = ts.replace('T', ' ').slice(0, 16);
        th.style.whiteSpace = 'nowrap';
        thead.appendChild(th);
      });

      // build table rows — gold section then silver
      const tbody = document.querySelector('#latest-table tbody');
      const lastTs = tableTs[tableTs.length - 1] || '';

      const addSection = (label, cls, products) => {
        const hdr = document.createElement('tr');
        hdr.innerHTML = `<td colspan="${colCount}"><h3 class="${cls}">${label}</h3></td>`;
        tbody.appendChild(hdr);
        for (const [name, entries] of Object.entries(products)) {
          const priceMap = Object.fromEntries(entries.map(e => [e.ts, e.price]));
          const tr = document.createElement('tr');
          const cells = tableTs.map(ts => {
            const p = priceMap[ts];
            return p != null
              ? `<td class="price">${p.toLocaleString('en-AU', {minimumFractionDigits:2})}</td>`
              : `<td style="color:#ccc">—</td>`;
          }).join('');
          tr.innerHTML = `<td>${name.replace('The Perth Mint ', '')}</td>${cells}`;
          tbody.appendChild(tr);
        }
      };

      addSection('Gold', 'gold-head', gold);
      addSection('Silver', 'silver-head', silver);

      document.getElementById('last-updated').textContent = `Last scraped: ${lastTs.replace('T', ' ').slice(0, 16)} UTC`;

      // chart — last 7 days
      const cutoff = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
      const allTs = [...new Set(rows.map(r => r[0]).filter(ts => ts >= cutoff))].sort();

      buildChart('chart-gold',   allTs, gold,   GOLD_COLORS);
      buildChart('chart-silver', allTs, silver, SILVER_COLORS);

      document.getElementById('status').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }

    load().catch(e => {
      document.getElementById('status').textContent = 'Failed to load prices: ' + e.message;
    });
  </script>
</body>
</html>
